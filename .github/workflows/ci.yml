name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install package
        run: python -m pip install -e .

      - name: Compile Python files
        run: python -m compileall adaptive_video_player demo demo_project

      - name: Check JavaScript syntax
        run: node --check adaptive_video_player/static/adaptive_video_player/player.js

      - name: Check Django demo project
        run: python manage.py check
