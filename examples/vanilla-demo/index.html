<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Adaptive Video Player Demo</title>
    <link rel="stylesheet" href="../../adaptive_video_player/static/adaptive_video_player/player.css">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #16181b;
        color: #f7f4ef;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(130deg, rgba(53, 194, 161, 0.18), transparent 34%),
          linear-gradient(310deg, rgba(242, 184, 75, 0.14), transparent 36%),
          #16181b;
      }

      main {
        width: min(1040px, 100%);
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 3vw, 3rem);
        letter-spacing: 0;
      }

      p {
        max-width: 720px;
        margin: 0;
        color: #cbd1d7;
        line-height: 1.6;
      }

      .demo-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .demo-actions input,
      .demo-actions button {
        min-height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(8, 10, 12, 0.72);
        color: #f7f4ef;
        font: inherit;
      }

      .demo-actions input {
        flex: 1 1 360px;
        min-width: 0;
        padding: 0 12px;
      }

      .demo-actions button {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 0 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Adaptive Video Player</h1>
        <p>
          A vanilla JavaScript HLS player that can be dropped into Django templates.
          It reads a master playlist, uses adaptive bitrate playback, and exposes speed and quality controls.
        </p>
      </header>

      <section
        class="avp"
        data-adaptive-player
        data-src="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
        data-title="Open HLS Test Stream"
      >
        <video class="avp__video" playsinline preload="metadata"></video>

        <div class="avp__topbar">
          <span class="avp__title">Open HLS Test Stream</span>
          <span class="avp__metric" data-avp-speed>-- Mbps</span>
        </div>

        <div class="avp__controls" data-avp-controls>
          <button class="avp__button" type="button" data-avp-play aria-label="Play">
            <i data-lucide="play"></i>
          </button>
          <span class="avp__time" data-avp-current>0:00</span>
          <input class="avp__range avp__timeline" type="range" min="0" max="1000" value="0" data-avp-timeline aria-label="Seek">
          <span class="avp__time" data-avp-duration>0:00</span>
          <button class="avp__button" type="button" data-avp-mute aria-label="Mute">
            <i data-lucide="volume-2"></i>
          </button>
          <input class="avp__range avp__volume" type="range" min="0" max="1" step="0.01" value="1" data-avp-volume aria-label="Volume">
          <select class="avp__select" data-avp-quality aria-label="Quality">
            <option value="-1">Auto</option>
          </select>
          <button class="avp__button" type="button" data-avp-pip aria-label="Picture in picture">
            <i data-lucide="picture-in-picture-2"></i>
          </button>
          <button class="avp__button" type="button" data-avp-fullscreen aria-label="Fullscreen">
            <i data-lucide="maximize"></i>
          </button>
        </div>
      </section>

      <form class="demo-actions" id="stream-form">
        <input id="stream-url" type="url" value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" aria-label="HLS playlist URL">
        <button type="submit">
          <i data-lucide="radio"></i>
          Load stream
        </button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../adaptive_video_player/static/adaptive_video_player/player.js"></script>
    <script>
      document.getElementById("stream-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const url = document.getElementById("stream-url").value;
        const root = document.querySelector("[data-adaptive-player]");
        root.avp?.destroy();
        root.dataset.src = url;
        root.dataset.avpReady = "";
        root.querySelector("video").removeAttribute("src");
        root.avp = new window.AdaptiveVideoPlayer(root, { src: url });
      });
    </script>
  </body>
</html>
